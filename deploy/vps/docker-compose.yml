name: equitylens-vps

x-backend: &backend
  build:
    context: ../../backend
  env_file: .env
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in deploy/vps/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/vps/.env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in deploy/vps/.env}
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=4GB
      - -c
      - wal_compression=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    shm_size: 256mb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.8.0-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    volumes:
      - redis_data:/data

  migrate:
    <<: *backend
    build:
      context: ../../backend
      target: api
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *backend
    build:
      context: ../../backend
      target: api
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "8000"
    ports:
      - "127.0.0.1:${API_PORT:-18000}:8000"

  worker:
    <<: *backend
    build:
      context: ../../backend
      target: worker
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2.10-alpine
    profiles: ["caddy"]
    environment:
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN in deploy/vps/.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
