name: equitylens-vps

x-backend: &backend
  build:
    context: ../../backend
  env_file: .env
  restart: unless-stopped

services:
  redis:
    image: redis:8.8.0-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    volumes:
      - redis_data:/data

  migrate:
    <<: *backend
    build:
      context: ../../backend
      target: api
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    <<: *backend
    build:
      context: ../../backend
      target: api
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    <<: *backend
    build:
      context: ../../backend
      target: worker
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2.10-alpine
    environment:
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN in deploy/vps/.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  redis_data:
  caddy_data:
  caddy_config:
