name: equitylens

services:
  db:
    image: pgvector/pgvector:0.8.2-pg17-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-equitylens}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.8.0-alpine
    command: ["redis-server", "--save", "60", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  minio:
    image: quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-07-21T05-28-08Z
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      set -eu;
      until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done;
      until mc ready local; do sleep 1; done;
      mc mb --ignore-existing "local/$${S3_BUCKET}";
      mc anonymous set none "local/$${S3_BUCKET}";
      printf '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetBucketLocation","s3:ListBucket"],"Resource":["arn:aws:s3:::%s"]},{"Effect":"Allow","Action":["s3:GetObject","s3:PutObject"],"Resource":["arn:aws:s3:::%s/*"]}]}' "$${S3_BUCKET}" "$${S3_BUCKET}" > /tmp/equitylens-graph-policy.json;
      mc admin policy create local equitylens-graph /tmp/equitylens-graph-policy.json;
      mc admin user add local "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}";
      mc admin policy attach local equitylens-graph --user "$${S3_ACCESS_KEY_ID}"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}"
      S3_BUCKET: ${S3_BUCKET:-filings}
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  migrate:
    build:
      context: ./backend
      target: api
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./backend
      target: api
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-s3}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-filings}
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}"
      SUPPLY_CHAIN_GRAPH_MODEL_OVERRIDE: ${SUPPLY_CHAIN_GRAPH_MODEL_OVERRIDE:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: ./backend
      target: worker
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-s3}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-filings}
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}"
      SUPPLY_CHAIN_GRAPH_MODEL_OVERRIDE: ${SUPPLY_CHAIN_GRAPH_MODEL_OVERRIDE:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://api:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      GUEST_SIGNING_SECRET: ${GUEST_SIGNING_SECRET}
      INTERNAL_JOB_SECRET: ${INTERNAL_JOB_SECRET}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
